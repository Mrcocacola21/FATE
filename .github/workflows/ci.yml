name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Rules tests
        run: npm run -w rules test

      - name: Server tests
        run: npm run -w server test

      - name: Web typecheck
        run: npm run -w web typecheck

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev || true
